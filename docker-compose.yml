services:
  db:
    image: postgres:16-alpine
    container_name: eventos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventos
      POSTGRES_USER: eventos_user
      POSTGRES_PASSWORD: eventos_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventos_user -d eventos"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: eventos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventos_backend
    restart: unless-stopped
    working_dir: /app/backend
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://eventos_user:eventos_pass@db:5432/eventos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: php:8.2-apache
    container_name: eventos_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/html
      - ./frontend/.htaccess:/var/www/html/.htaccess
    environment:
      API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: